services:
  - type: web
    name: tenancy-bot
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node src/bot/index.js
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: CLIENT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: DASHBOARD_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: NODE_ENV
        value: production
