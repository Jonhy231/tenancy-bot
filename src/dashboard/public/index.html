<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenancy — Initialize Sequence</title>
    <meta name="description" content="Tenancy Multi-tenant system initialization.">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="landing-page">
    
    <nav class="landing-nav" style="position: absolute; top: 0; width: 100%; padding: 1rem 2rem; display: flex; justify-content: space-between; z-index: 10;">
        <div class="nav-brand">
            <span class="brand-text">Ten<span class="accent glitch-hover">ancy</span></span>
        </div>
        <a href="/auth/discord" class="btn btn-outline btn-sm glitch-hover">
            [ ESTABLECER CONEXIÓN ]
        </a>
    </nav>

    <main class="terminal-wrapper">
        <div class="terminal-box">
            <div class="terminal-header">
                <span class="terminal-title">TENANCY_SYS_V2.0.0</span>
                <div class="terminal-actions">
                    <span></span><span></span><span></span>
                </div>
            </div>
            <div class="terminal-body" id="terminalOutput">
                <!-- Lines will be typed here -->
            </div>
        </div>
    </main>

    <script>
        const lines = [
            { text: "INICIANDO PROTOCOLO TENANCY...", type: "info", delay: 500 },
            { text: "CARGANDO MÓDULOS MULTI-TENANT [||||||||||||||||||||] 100%", type: "success", delay: 800 },
            { text: "CONECTANDO CON BASE DE DATOS MONGODB ATLAS...", type: "info", delay: 600 },
            { text: "CONEXIÓN ESTABLECIDA.", type: "success", delay: 300 },
            { text: "AISLANDO ENTORNOS DE SERVIDOR...", type: "info", delay: 400 },
            { text: "ADVERTENCIA: Interfaz detectada de forma no convencional.", type: "accent", delay: 600 },
            { text: "SISTEMA DE TICKETS PREMIUM LISTO. ESPERANDO AUTENTICACIÓN OAUTH2.", type: "success", delay: 800 }
        ];

        const terminal = document.getElementById("terminalOutput");
        
        async function typeLines() {
            for (let line of lines) {
                await new Promise(r => setTimeout(r, line.delay));
                const lineDiv = document.createElement("div");
                lineDiv.className = "terminal-line";
                
                const prompt = document.createElement("span");
                prompt.className = "terminal-prompt";
                prompt.innerText = "root@tenancy:~#";
                
                const text = document.createElement("span");
                text.className = `terminal-text ${line.type}`;
                text.innerText = line.text;
                
                lineDiv.appendChild(prompt);
                lineDiv.appendChild(text);
                terminal.appendChild(lineDiv);
            }
            
            // Show CTA
            await new Promise(r => setTimeout(r, 800));
            const ctaDiv = document.createElement("div");
            ctaDiv.className = "terminal-cta";
            ctaDiv.innerHTML = `
                <a href="/auth/discord" class="btn btn-primary glitch-hover">
                    > EXECUTE_LOGIN()
                </a>
            `;
            terminal.appendChild(ctaDiv);
        }
        
        window.onload = typeLines;
    </script>
</body>
</html>
