<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenancy Store</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Sellix Embed CSS & JS -->
    <link href="https://cdn.sellix.io/static/css/embed.css" rel="stylesheet"/>
    <script src="https://cdn.sellix.io/static/js/embed.js"></script>

    <style>
        .store-bg {
            background-color: #1a1b26;
            min-height: 100vh;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            font-family: 'Inter', sans-serif;
        }
        .store-container {
            width: 100%;
            max-width: 800px;
            background: #232736;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: 2rem;
        }
        .store-header {
            background: #f5b027;
            color: #000;
            text-align: center;
            padding: 1rem;
            font-size: 1.5rem;
            font-weight: 700;
        }
        .store-body {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding: 2rem;
        }
        @media(min-width: 768px) {
            .store-body { flex-direction: row; }
        }
        .server-selector-card {
            background: #2f354a;
            border-radius: 8px;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            flex: 1;
            position: relative;
        }
        .server-selector-card select {
            width: 90%;
            padding: 10px;
            margin-top: 10px;
            background: #1a1b26;
            color: white;
            border: 1px solid #4a5578;
            border-radius: 4px;
        }
        .plans-container {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .plan-card {
            background: #2f354a;
            border-radius: 8px;
            padding: 1.5rem;
        }
        .plan-card h3 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.5rem;
        }
        .plan-card h3 span { color: #a0a8c2; font-size: 1rem; font-weight: 500; }
        .plan-price { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; }
        .plan-price span { font-size: 1rem; color: #a0a8c2; font-weight: 500; }
        .btn-purchase {
            width: 100%;
            background: #f5b027;
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.1rem;
        }
        .btn-purchase:hover { background: #e09f1d; }
        .btn-purchase:disabled { background: #4a5578; color: #8e95a8; cursor: not-allowed; }

        .top-nav { width: 100%; max-width: 900px; display: flex; justify-content: space-between; align-items: center; }
        .top-nav a { color: #a0a8c2; text-decoration: none; font-weight: 500; }
        .top-nav a:hover { color: #fff; }
    </style>
</head>
<body class="store-bg">
    
    <div class="top-nav">
        <a href="/"><i class="ph ph-arrow-left"></i> Volver al Inicio</a>
        <span style="font-weight: 700; font-size: 1.5rem;">Ten<span style="color:#f5b027;">ancy</span> Store</span>
    </div>

    <!-- VISTA: TIENDA SELLIX -->
    <div class="store-container" id="storeView">
        <div class="store-header">
            Checkout Oficial
        </div>
        <div class="store-body">
            <!-- Izquierda: Selector -->
            <div class="server-selector-card">
                <img id="serverIcon" src="https://cdn.discordapp.com/embed/avatars/0.png" alt="Server" style="width: 80px; height: 80px; border-radius: 50%; margin-bottom: 1rem;">
                <h3 id="serverName" style="margin-bottom: 1rem; color: #fff; font-size: 1.1rem;">Selecciona un servidor</h3>
                <i class="ph ph-arrows-left-right" style="font-size: 1.5rem; color: #a0a8c2; margin-bottom: 0.5rem;"></i>
                <select id="serverSelectStore">
                    <option value="">Cargando servidores...</option>
                </select>
                <div style="margin-top: 1.5rem; font-size: 0.8rem; color: #a0a8c2;">
                    Pagos procesados de forma segura mediante <br><strong>Sellix.io</strong> (PayPal, Binance, Tarjetas)
                </div>
            </div>
            
            <!-- Derecha: Planes -->
            <div class="plans-container">
                <div class="plan-card" style="border: 1px solid #f5b027;">
                    <h3>Tenancy Premium <span>Licencia de por vida</span></h3>
                    <div class="plan-price">$29.99 <span>/ pago único</span></div>
                    
                    <!-- BOTÓN DE SELLIX (Inicia deshabilitado hasta que seleccione servidor) -->
                    <button 
                        id="sellixBtn" 
                        class="btn-purchase" 
                        disabled
                        data-sellix-product="TU_ID_DE_PRODUCTO_SELLIX" 
                        data-sellix-custom-discord_server_id=""
                    >
                        <i class="ph ph-lock-key"></i> Comprar Premium
                    </button>
                    <div style="text-align: center; font-size: 0.8rem; color: #a0a8c2; margin-top: 10px;">Selecciona un servidor a la izquierda para continuar.</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let serversList = [];

        // 1. Cargar servidores del usuario
        async function fetchServers() {
            try {
                const res = await fetch("/api/servers");
                if (!res.ok) {
                    if (res.status === 401) window.location.href = "/auth/discord";
                    return;
                }
                const data = await res.json();
                serversList = [...data.serversWithBot, ...data.serversWithoutBot];
                
                const select = document.getElementById("serverSelectStore");
                select.innerHTML = '<option value="">Selecciona un servidor primero...</option>';
                
                serversList.forEach(s => {
                    select.innerHTML += `<option value="${s.id}">${s.name}</option>`;
                });

                // Cuando elige un servidor:
                select.addEventListener("change", (e) => {
                    const serverId = e.target.value;
                    const s = serversList.find(x => x.id === serverId);
                    const btn = document.getElementById("sellixBtn");

                    if (s) {
                        document.getElementById("serverName").innerText = s.name;
                        document.getElementById("serverIcon").src = s.icon || 'https://cdn.discordapp.com/embed/avatars/0.png';
                        
                        // Habilitar el botón de Sellix e inyectarle la ID del servidor como campo personalizado
                        btn.disabled = false;
                        btn.setAttribute('data-sellix-custom-discord_server_id', serverId);
                    } else {
                        document.getElementById("serverName").innerText = 'Selecciona un servidor';
                        document.getElementById("serverIcon").src = 'https://cdn.discordapp.com/embed/avatars/0.png';
                        btn.disabled = true;
                        btn.setAttribute('data-sellix-custom-discord_server_id', '');
                    }
                });

            } catch (err) {
                console.error(err);
            }
        }

        fetchServers();
    </script>
</body>
</html>
